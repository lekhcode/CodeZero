# Redis for BullMQ (compiler execution queue).
# Usage: docker compose -f docker-compose.compiler.yml up -d
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - compiler_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  compiler_redis_data:
